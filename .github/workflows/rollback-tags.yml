name: Rollback Tags

on:
  schedule:
    - cron: "30 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create-rollback-tag:
    name: create-rollback-tag
    runs-on: ubuntu-latest
    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Fetch all tags
        run: git fetch --force --tags origin

      - name: Create daily rollback tag
        shell: bash
        run: |
          set -euo pipefail

          TAG_NAME="rollback-$(date -u +%F)"
          TAG_MESSAGE="Daily rollback snapshot for master on $(date -u +%F)"

          if git ls-remote --exit-code --tags origin "refs/tags/${TAG_NAME}" >/dev/null 2>&1; then
            echo "Tag ${TAG_NAME} already exists on origin. Skipping."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG_NAME}" -m "${TAG_MESSAGE}" HEAD
          git push origin "refs/tags/${TAG_NAME}"
